<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cart Test with CSP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

    <!-- inside your product-info column -->
    <h4 id="productName" class="alt-font text-dark-gray fw-500 mb-5px">
        B107
    </h4>

    <!-- Size Selection -->
    <div class="mb-3">
        <label for="size" class="form-label">Choose Size</label>
        <select id="size" class="form-select">
            <option value="">-- Select Size --</option>
            <option value="S">Small</option>
            <option value="M">Medium</option>
            <option value="L">Large</option>
            <option value="XL">Extra Large</option>
        </select>
    </div>
    <select id="color" class="form-select">
        <option value="">-- Select Color --</option>
        <option value="Red">Red</option>
        <option value="Blue">Blue</option>
        <option value="Black">Black</option>
    </select>


    <div class="d-flex align-items-center flex-column flex-sm-row mb-20px position-relative">
        <div class="col-12 col-lg-2 order-lg-1 position-relative single-product-thumb">
            <div class="swiper-container product-image-thumb slider-vertical">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img class="w-100" src="images/b107.jpg" alt="" id="productImage">
                    </div>

                    <!-- <select id="color" class="form-select">
                        <option value="">-- Select Color --</option>
                        <option value="Red" data-image="images/B107-red.jpg">Red</option>
                        <option value="Blue" data-image="images/B107-blue.jpg">Blue</option>
                        <option value="Black" data-image="images/B107-black.jpg">Black</option>
                    </select> -->

                </div>
            </div>
        </div>

        <div class="quantity me-15px xs-mb-15px order-1">
            <button type="button" class="qty-minus">-</button>
            <input class="qty-text" type="text" id="quantity" value="1" aria-label="quantity" />
            <button type="button" class="qty-plus">+</button>
        </div>

        <button id="addToCartBtn"
            class="btn btn-cart btn-extra-large btn-switch-text btn-box-shadow btn-none-transform btn-dark-gray left-icon btn-round-edge border-0 me-15px xs-me-0 order-3 order-sm-2">
            <span>
                <span><i class="feather icon-feather-shopping-bag"></i></span>
                <span class="btn-double-text ls-0px" data-text="Add to cart">Add to cart</span>
            </span>
        </button>
    </div>

    <!-- Cart section (temporary, so you can see it working) -->
    <div class="mt-4">
        <h5>Cart</h5>
        <ul id="cartItems" class="list-group mb-2"></ul>
        <div id="cartEmpty" class="text-muted small">Cart is empty</div>
    </div>


    <!-- ✅ External script only (no inline code!) -->
    <script src="product.js" defer></script>
</body>

</html>
